<head>
    <title>Elegant Yachting Tours | Contact</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
</head>

<body>
    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="tours.html">Tours</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- This is the form section -->

    <div class="contact">
        <div class="contact-box">
            <h2>Send us a message:</h2>
            <!-- Action relates to an external .php file for functionality-->
            <form action="#" method="post">
                <label for="firstname">First Name:</label>
                <input type="text" id="firstname" name="firstname" placeholder="John"><br>
                <label for="surname">Surname:</label>
                <input type="text" id="surname" name="surname" placeholder="Doe"><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="john.doe@example.com"><br><br>

                <h3>Which best summarises your query?</h3>

                <input type="Radio" id="category" name="category" value="Booking">
                <label for="category">Booking</label><br>
                <input type="Radio" id="category" name="category" value="General Inquiry">
                <label for="category">General Inquiry</label><br><br>

                <h3>Please select desired amenities:</h3>

                <input type="checkbox" id="wifi" name="wifi" value="WiFi">
                <label for="wifi">WiFi</label><br>
                <input type="checkbox" id="meals" name="meals" value="Meals">
                <label for="meals">Meals</label><br>
                <input type="checkbox" id="snorkeling" name="snorkeling" value="Snorkeling">
                <label for="snorkeling">Snorkeling Gear</label><br>
                <input type="checkbox" id="fishing" name="fishing" value="Fishing">
                <label for="fishing">Fishing Equipment</label><br>
                <input type="checkbox" id="diving" name="diving" value="Diving">
                <label for="diving">Diving Gear</label><br><br>

                <label for="message">Your Message:</label><br>
                <textarea id="message" name="message" rows="6" cols="40"
                    placeholder="Type your message here..."></textarea><br><br>
                <input type="submit">
            </form>
        </div>
    </div>

    <!-- This is the footer section-->
    <footer>
        <div class="footer-content">
            <p>&copy; 2025 Elegant Yachting Tours. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="tours.html">Tours</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <p class="footer-social">
                <a href="https://facebook.com"><i class="fa-brands fa-square-facebook"></i></a>
                <a href="https://instagram.com"><i class="fa-brands fa-square-instagram"></i></a>
                <a href="x.com"><i class="fa-brands fa-x-twitter"></i></a>
            </p>
        </div>
    </footer>
</body>
